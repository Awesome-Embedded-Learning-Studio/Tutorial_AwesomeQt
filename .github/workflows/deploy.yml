name: Deploy VitePress

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 官方 Pages 部署需要 pages:write + id-token:write（OIDC 鉴权）；
# 不再需要 contents:write（旧方案靠它推 gh-pages 分支）。
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务，避免连续 push 时旧部署覆盖新部署。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 绑定 github-pages 环境，部署后产出可访问的站点 URL。
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 复用分卷构建的增量缓存（build.ts 写入 site/.vitepress/.build-cache），二次构建只重建改动卷。
      # cache key 只含真正影响构建产物的路径——tutorial 内容 + 站点配置/插件/主题 + 构建脚本 + 依赖锁。
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: site/.vitepress/.build-cache
          key: deploy-vp-build-${{ runner.os }}-${{ hashFiles('tutorial/**', 'site/.vitepress/config/**', 'site/.vitepress/plugins/**', 'site/.vitepress/theme/**', 'scripts/build.ts', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            deploy-vp-build-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          # 专家层全量 102 篇构建内存峰值较高，放宽堆上限防 OOM；并发 8 卷。
          NODE_OPTIONS: --max-old-space-size=6144
          BUILD_CONCURRENCY: 8

      # ── 官方 Pages 部署三件套（替代旧的 peaceiris/actions-gh-pages）─────────────
      # 不再推 gh-pages 分支，直接把构建产物作为临时 artifact 上传后部署，用完即弃，不污染仓库历史。
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
